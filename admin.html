<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة | فريق تعزيز التقدم التطوعي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF6EC;--cream-2:#F3EAD8;--pine:#163F33;--pine-2:#1F5142;
    --leaf:#3E8E6E;--clay:#D9613A;--clay-soft:#E8865F;--ink:#22322B;
    --muted:#6E7B72;--line:#E0D5BF;--white:#fff;
    --amber:#C98A2B;--red:#C44A36;--green:#2E7D5B;
    --shadow:0 18px 40px -22px rgba(22,63,51,.45);
    --shadow-sm:0 8px 22px -14px rgba(22,63,51,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"IBM Plex Sans Arabic",sans-serif;background:var(--cream);color:var(--ink);line-height:1.6;min-height:100vh}
  body::before{content:"";position:fixed;inset:0;z-index:0;background:
    radial-gradient(circle at 90% 8%, rgba(62,142,110,.10), transparent 36%),
    radial-gradient(circle at 6% 92%, rgba(217,97,58,.08), transparent 38%);pointer-events:none}

  /* ===== شاشة الدخول ===== */
  .login-screen{position:fixed;inset:0;z-index:30;display:grid;place-items:center;padding:20px;background:var(--cream)}
  .login-box{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);
    width:100%;max-width:410px;padding:42px 34px;text-align:center;animation:rise .5s ease both}
  .login-box .logo{width:60px;height:60px;border-radius:18px;margin:0 auto 20px;
    background:linear-gradient(135deg,var(--pine),var(--leaf));display:grid;place-items:center;color:#fff;font-size:1.7rem}
  .login-box h1{font-family:"Reem Kufi",sans-serif;font-size:1.5rem;color:var(--pine);margin-bottom:6px}
  .login-box .tag{color:var(--muted);font-size:.92rem;margin-bottom:28px}
  .login-box .field{text-align:right;margin-bottom:16px}
  .login-box label{display:block;font-weight:600;font-size:.9rem;margin-bottom:7px}
  .login-box input{width:100%;font-family:inherit;font-size:1rem;background:var(--cream);
    border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;transition:.2s}
  .login-box input:focus{outline:none;border-color:var(--leaf);background:#fff;box-shadow:0 0 0 4px rgba(62,142,110,.14)}
  .login-box button{width:100%;margin-top:8px;font-family:"Reem Kufi",sans-serif;font-weight:600;font-size:1.05rem;
    color:#fff;background:linear-gradient(135deg,var(--pine),var(--pine-2));border:none;border-radius:14px;
    padding:15px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:9px}
  .login-box button:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
  .login-box button:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .login-err{color:var(--red);font-size:.88rem;margin-top:14px;min-height:20px;font-weight:500}
  .spin{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rot .7s linear infinite;display:none}
  button.loading .spin{display:inline-block}

  /* ===== التطبيق ===== */
  .app{display:none;position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:26px 20px 70px}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px}
  .topbar .brand{display:flex;align-items:center;gap:13px}
  .topbar .brand .logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--pine),var(--leaf));display:grid;place-items:center;color:#fff;font-size:1.3rem;flex:none}
  .topbar .brand h1{font-family:"Reem Kufi",sans-serif;font-size:1.25rem;color:var(--pine);line-height:1.2}
  .topbar .brand p{font-size:.82rem;color:var(--muted)}
  .logout{display:flex;align-items:center;gap:8px;font-family:inherit;font-weight:600;font-size:.9rem;color:var(--clay);
    background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:10px 18px;cursor:pointer;transition:.2s}
  .logout:hover{background:var(--clay);color:#fff;border-color:var(--clay)}

  /* الإحصائيات */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .stat::after{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:5px;background:var(--c)}
  .stat .num{font-family:"Reem Kufi",sans-serif;font-size:2rem;font-weight:700;color:var(--pine);line-height:1}
  .stat .lbl{font-size:.85rem;color:var(--muted);margin-top:6px}
  .stat.all{--c:var(--leaf)} .stat.pend{--c:var(--amber)} .stat.acc{--c:var(--green)} .stat.rej{--c:var(--red)}

  /* أدوات التحكم */
  .controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow-sm)}
  .controls input,.controls select{font-family:inherit;font-size:.95rem;background:var(--cream);border:1.5px solid var(--line);border-radius:11px;padding:11px 14px;transition:.2s}
  .controls input{flex:1;min-width:200px}
  .controls input:focus,.controls select:focus{outline:none;border-color:var(--leaf);background:#fff;box-shadow:0 0 0 4px rgba(62,142,110,.12)}

  /* البطاقات */
  .list{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}
  .req{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:var(--shadow-sm);transition:.2s;animation:rise .4s ease both}
  .req:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .req .r-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
  .req .r-name{font-family:"Reem Kufi",sans-serif;font-size:1.18rem;color:var(--pine);font-weight:600}
  .req .r-gov{font-size:.85rem;color:var(--muted);margin-top:2px}
  .pill{font-size:.75rem;font-weight:600;padding:5px 12px;border-radius:999px;white-space:nowrap;flex:none}
  .pill.pending{background:#FBF0DA;color:var(--amber)}
  .pill.accepted{background:#DEF1E7;color:var(--green)}
  .pill.rejected{background:#F8E0DB;color:var(--red)}
  .req .rows{border-top:1px dashed var(--line);padding-top:14px;margin-bottom:16px}
  .req .row{display:flex;gap:8px;font-size:.92rem;padding:4px 0}
  .req .row .k{color:var(--muted);min-width:70px;font-weight:500}
  .req .row .v{color:var(--ink);font-weight:500}
  .req .reason{background:var(--cream);border-radius:11px;padding:11px 13px;font-size:.9rem;color:var(--ink);margin-top:4px;line-height:1.6}
  .id-thumb{width:100%;height:150px;object-fit:cover;border-radius:11px;border:1.5px solid var(--line);margin-top:10px;cursor:zoom-in;transition:.2s;display:block}
  .id-thumb:hover{filter:brightness(.95);border-color:var(--leaf)}
  .no-id{margin-top:10px;padding:14px;text-align:center;font-size:.85rem;color:var(--muted);background:var(--cream);border-radius:11px;border:1px dashed var(--line)}
  .lightbox{position:fixed;inset:0;z-index:80;background:rgba(15,30,24,.88);display:none;align-items:center;justify-content:center;padding:24px;cursor:zoom-out}
  .lightbox.show{display:flex}
  .lightbox img{max-width:95%;max-height:92%;border-radius:12px;box-shadow:0 30px 60px -20px rgba(0,0,0,.7)}
  .lightbox .lb-close{position:fixed;top:18px;inset-inline-end:22px;width:42px;height:42px;border-radius:50%;background:#fff;color:var(--pine);border:none;font-size:1.3rem;cursor:pointer;font-weight:700}
  .actions{display:flex;gap:9px;margin-top:16px}
  .actions button{flex:1;font-family:inherit;font-weight:600;font-size:.88rem;border:none;border-radius:11px;padding:11px;cursor:pointer;transition:.18s;display:flex;align-items:center;justify-content:center;gap:6px}
  .b-acc{background:var(--green);color:#fff}
  .b-rej{background:#fff;color:var(--red);border:1.5px solid var(--red)!important}
  .b-del{background:var(--cream-2);color:var(--muted);flex:none!important;width:46px}
  .actions button:hover{transform:translateY(-2px);filter:brightness(1.05)}
  .b-del:hover{background:var(--red);color:#fff}

  .empty{text-align:center;padding:70px 20px;color:var(--muted);grid-column:1/-1}
  .empty .e-ic{font-size:3rem;opacity:.4;margin-bottom:14px}
  .empty h3{font-family:"Reem Kufi",sans-serif;color:var(--pine);font-size:1.3rem;margin-bottom:6px}

  /* رسالة منبثقة */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--pine);color:#fff;
    padding:14px 24px;border-radius:13px;font-weight:500;box-shadow:0 20px 40px -18px rgba(0,0,0,.5);z-index:60;transition:.4s cubic-bezier(.2,.8,.2,1)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--clay)}

  @keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes rot{to{transform:rotate(360deg)}}
  @media(max-width:720px){.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- ===== شاشة تسجيل الدخول ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo">✦</div>
    <h1>لوحة الإدارة</h1>
    <p class="tag">فريق تعزيز التقدم التطوعي</p>
    <form id="loginForm">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="admin@email.com" required>
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" id="loginBtn"><span class="spin"></span><span>تسجيل الدخول</span></button>
    </form>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ===== التطبيق بعد الدخول ===== -->
<div class="app" id="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">✦</div>
      <div>
        <h1>إدارة طلبات التطوع</h1>
        <p id="adminEmail"></p>
      </div>
    </div>
    <button class="logout" id="logoutBtn">↩ تسجيل الخروج</button>
  </div>

  <div class="stats">
    <div class="stat all"><div class="num" id="cAll">0</div><div class="lbl">إجمالي الطلبات</div></div>
    <div class="stat pend"><div class="num" id="cPend">0</div><div class="lbl">قيد المراجعة</div></div>
    <div class="stat acc"><div class="num" id="cAcc">0</div><div class="lbl">مقبولة</div></div>
    <div class="stat rej"><div class="num" id="cRej">0</div><div class="lbl">مرفوضة</div></div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="🔍 بحث بالاسم، رقم الطلب، الهاتف، التخصص...">
    <select id="filterStatus">
      <option value="">كل الحالات</option>
      <option value="pending">قيد المراجعة</option>
      <option value="accepted">مقبولة</option>
      <option value="rejected">مرفوضة</option>
    </select>
  </div>

  <div class="list" id="list"></div>
</div>

<div class="toast" id="toast"><span id="toastTxt"></span></div>

<!-- نافذة تكبير صورة الهوية -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <img id="lightboxImg" src="" alt="الهوية الجامعية">
</div>

<!-- ===== كود Firebase ===== -->
<script type="module">
  import { db, auth, VOLUNTEERS_COLLECTION, STATUS_COLLECTION } from "./firebase-config.js";
  import { signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
  import { collection, query, orderBy, onSnapshot, doc, updateDoc, setDoc, deleteDoc }
    from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

  // عناصر الواجهة
  const loginScreen = document.getElementById("loginScreen");
  const app         = document.getElementById("app");
  const loginForm   = document.getElementById("loginForm");
  const loginBtn    = document.getElementById("loginBtn");
  const loginErr    = document.getElementById("loginErr");
  const listEl      = document.getElementById("list");
  const toast       = document.getElementById("toast");

  let allRequests = [];   // كل الطلبات (تتحدث لحظياً)
  let unsubscribe = null; // لإيقاف الاستماع عند الخروج

  // تكبير صورة الهوية عند الضغط عليها
  const lightbox    = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  listEl.addEventListener("click", (e) => {
    if(e.target.classList.contains("id-thumb")){
      lightboxImg.src = e.target.src;
      lightbox.classList.add("show");
    }
  });
  const closeLb = () => { lightbox.classList.remove("show"); lightboxImg.src = ""; };
  lightbox.addEventListener("click", closeLb);
  document.getElementById("lbClose").addEventListener("click", closeLb);

  function showToast(msg, isErr=false){
    document.getElementById("toastTxt").textContent = msg;
    toast.className = "toast show" + (isErr ? " err" : "");
    setTimeout(() => toast.className = "toast", 3000);
  }

  // ===== 1) تسجيل الدخول =====
  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginErr.textContent = "";
    loginBtn.classList.add("loading"); loginBtn.disabled = true;
    try{
      await signInWithEmailAndPassword(
        auth,
        document.getElementById("email").value.trim(),
        document.getElementById("password").value
      );
    }catch(err){
      const map = {
        "auth/invalid-credential":"البريد أو كلمة المرور غير صحيحة",
        "auth/invalid-email":"صيغة البريد غير صحيحة",
        "auth/user-not-found":"المستخدم غير موجود",
        "auth/wrong-password":"كلمة المرور غير صحيحة",
        "auth/too-many-requests":"محاولات كثيرة، حاول لاحقاً"
      };
      loginErr.textContent = map[err.code] || "فشل تسجيل الدخول";
    }finally{
      loginBtn.classList.remove("loading"); loginBtn.disabled = false;
    }
  });

  // ===== 2) تسجيل الخروج =====
  document.getElementById("logoutBtn").addEventListener("click", () => signOut(auth));

  // ===== 3) مراقبة حالة الدخول =====
  onAuthStateChanged(auth, (user) => {
    if(user){
      loginScreen.style.display = "none";
      app.style.display = "block";
      document.getElementById("adminEmail").textContent = user.email;
      startListening();
    }else{
      app.style.display = "none";
      loginScreen.style.display = "grid";
      loginForm.reset();
      if(unsubscribe){ unsubscribe(); unsubscribe = null; }
    }
  });

  // ===== 4) جلب الطلبات لحظياً من Firestore =====
  function startListening(){
    const q = query(collection(db, VOLUNTEERS_COLLECTION), orderBy("createdAt","desc"));
    unsubscribe = onSnapshot(q, (snap) => {
      allRequests = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      updateStats();
      render();
    }, (err) => {
      console.error(err);
      showToast("تعذّر جلب الطلبات", true);
    });
  }

  // ===== 5) الإحصائيات =====
  function updateStats(){
    document.getElementById("cAll").textContent  = allRequests.length;
    document.getElementById("cPend").textContent = allRequests.filter(r => r.status==="pending").length;
    document.getElementById("cAcc").textContent  = allRequests.filter(r => r.status==="accepted").length;
    document.getElementById("cRej").textContent  = allRequests.filter(r => r.status==="rejected").length;
  }

  // ===== 6) البحث والفلترة =====
  ["search","filterStatus"].forEach(id =>
    document.getElementById(id).addEventListener("input", render)
  );

  function render(){
    const term   = document.getElementById("search").value.trim().toLowerCase();
    const status = document.getElementById("filterStatus").value;

    const filtered = allRequests.filter(r => {
      const matchTerm = !term ||
        (r.fullName||"").toLowerCase().includes(term) ||
        (r.ticket||"").toLowerCase().includes(term) ||
        (r.phone||"").includes(term) ||
        (r.specialty||"").toLowerCase().includes(term) ||
        (r.contact||"").toLowerCase().includes(term);
      const matchStatus = !status || r.status === status;
      return matchTerm && matchStatus;
    });

    if(filtered.length === 0){
      listEl.innerHTML = `<div class="empty">
        <div class="e-ic">✦</div>
        <h3>لا توجد طلبات</h3>
        <p>${allRequests.length===0 ? "لم يصل أي طلب بعد" : "لا توجد نتائج مطابقة للبحث"}</p>
      </div>`;
      return;
    }

    const labels = { pending:"قيد المراجعة", accepted:"مقبول", rejected:"مرفوض" };

    listEl.innerHTML = filtered.map(r => `
      <div class="req">
        <div class="r-top">
          <div>
            <div class="r-name">${esc(r.fullName)}</div>
            <div class="r-gov">🎓 خريج إعدادية • ${r.age} سنة</div>
          </div>
          <span class="pill ${r.status}">${labels[r.status]||""}</span>
        </div>
        <div class="rows">
          <div class="row"><span class="k">رقم الطلب:</span><span class="v" style="direction:ltr;font-weight:700;color:var(--pine)">${esc(r.ticket || "—")}</span></div>
          <div class="row"><span class="k">الهاتف:</span><span class="v">${esc(r.phone)}</span></div>
          <div class="row"><span class="k">التخصص:</span><span class="v">${esc(r.specialty)}</span></div>
          <div class="row"><span class="k">التواصل:</span><span class="v">${esc(r.contact)}</span></div>
          ${r.idCard
            ? `<img class="id-thumb" src="${r.idCard}" alt="الهوية الجامعية">`
            : `<div class="no-id">لا توجد صورة هوية</div>`}
        </div>
        <div class="actions">
          <button class="b-acc" onclick="setStatus('${r.id}','accepted')">✓ قبول</button>
          <button class="b-rej" onclick="setStatus('${r.id}','rejected')">✕ رفض</button>
          <button class="b-del" onclick="removeReq('${r.id}','${esc(r.fullName)}')" title="حذف">🗑</button>
        </div>
      </div>
    `).join("");
  }

  // حماية من حقن HTML
  function esc(s){ return String(s??"").replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  // ===== 7) تغيير الحالة (قبول/رفض) =====
  window.setStatus = async (id, status) => {
    const r = allRequests.find(x => x.id === id);
    try{
      await updateDoc(doc(db, VOLUNTEERS_COLLECTION, id), { status });
      // تحديث نسخة التتبع أيضاً حتى يشوفها المستخدم
      if(r?.ticket) await setDoc(doc(db, STATUS_COLLECTION, r.ticket), { status }, { merge:true });
      showToast(status==="accepted" ? "تم قبول الطلب ✓" : "تم رفض الطلب");
    }catch(err){ console.error(err); showToast("تعذّر تحديث الحالة", true); }
  };

  // ===== 8) حذف الطلب =====
  window.removeReq = async (id, name) => {
    if(!confirm(`حذف طلب "${name}" نهائياً؟`)) return;
    const r = allRequests.find(x => x.id === id);
    try{
      await deleteDoc(doc(db, VOLUNTEERS_COLLECTION, id));
      if(r?.ticket) await deleteDoc(doc(db, STATUS_COLLECTION, r.ticket));
      showToast("تم حذف الطلب");
    }catch(err){ console.error(err); showToast("تعذّر الحذف", true); }
  };
</script>
</body>
</html>
